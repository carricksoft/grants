<!DOCTYPE html>
<!--suppress XmlHighlighting -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <!--suppress SpellCheckingInspection -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

    <!--suppress SpellCheckingInspection -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
            integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <title>Grants - person</title>

</head>
<body>
<!--/*@thymesVar id="personCommand" type="scot.carricksoftware.grants.commands.people.PersonCommand"*/-->
<div th:insert="~{fragments/layout::banner}"></div>

<div class="container-fluid" style="margin-top: 20px;">
    <h1 id="pageHeader">Grants Application - People</h1>
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <div class="mx-auto" style="width:90%;">
                <form th:object="${personCommand}" th:action="@{/person/}" method="post">
                    <div class="panel-group">
                        <div class="panel panel-primary">
                            <div class="panel-heading">
                                <h1 class="panel-title">Person</h1>
                            </div>
                            <div class="panel-body">
                                <div class="form-row">
                                    <label for="firstName">First Name:</label>
                                    <input type="text" id="firstName" style="width: 300px;" class="form-control"
                                           th:field="*{firstName}"
                                           th:errorclass="has-error"/>
                                    <div class="col-md-3 form-group">
                                        <label for="databaseId">Database ID:<span style="color: rgb(255,0,0);">*</span>
                                        </label>
                                        <input type="text" id="databaseId" style="width: 100px;" class="form-control"
                                               th:field="*{id}"
                                               readonly>
                                    </div>
                                </div>
                            </div>
                            <hr style="height:20px;border:none;color:#FFFF;background-color:#FFFF;"/>
                        </div>
                        <button type="submit" class="btn btn-primary">Commit</button>
                        <a class="btn btn-secondary" th:href="@{/person/list}" th:text="${'List all'}">List all</a>
                        <a class="btn btn-success" th:href="@{/}" th:text="${'Home'}">Home</a>
                        <h6><span style="color: rgb(255,0,0);">*</span><span> Cannot be edited</span></h6>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
