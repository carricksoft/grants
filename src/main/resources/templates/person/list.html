<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>People </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<div class="Banner">
    <div class="p-3 mb-2 bg-primary text-white">
        <div class="row align-items-start">
            <div class="col">
                <img class="img-responsive" src="../../static/resources/images/Four.jpg"
                     th:src="@{/resources/images/Four.jpg}" alt="Foursome" style="width:100px;height:100px;"/>
            </div>
            <div class="col">
                <br>
                <h1>The Grants</h1>
            </div>
            <div class="col">
                <img class="img-responsive" src="../../static/resources/images/Bellfield.jpg"
                     th:src="@{/resources/images/Bellfield.jpg}" alt="Bellfield" style="width:100px;height:100px;"/>
            </div>
        </div>
    </div>
</div>

<div class="container text-center">
    <div class="container border border-info
                    rounded-3 text-center p-4">
        <h3>Persons</h3>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th></th>
            </tr>
            </thead>

            <tr th:each="person : ${people}">
                <!--/*@thymesVar id="person" type="scot.carricksoftware.grants.domains.people.Person"*/-->
                <td th:text="${person.id}">123</td>
                <td th:text="${person.firstName}"> First</td>
                <td th:text="${person.lastName}">Last</td>
                <td><span>
                        <a th:action="delete" class="btn btn-danger btn-sm" href="./"
                           th:text="Delete"></a>
                    <a th:action="edit" class="btn btn-warning btn-sm" href="./"
                       th:text="Edit"></a>
                    </span></td>
            </tr>
            <tfoot>
            <tr>
                <td colspan="4"><span>
                        <a th:action="rewind" class="btn btn-secondary btn-sm" th:href="@{/people/rewind}"
                           th:text="'<<'"></a>
                         <a th:action="back" class="btn btn-secondary btn-sm"
                            th:href="@{/people/prev}" th:text="'<'"></a>
                         <a th:action="new" class="btn btn-primary btn-sm" href="/"
                            th:text="'New Person'"></a>
                         <a th:action="home" class="btn btn-success btn-sm"
                            href="./" th:text="'Home'"></a>
                         <a th:action="forward" class="btn btn-secondary btn-sm"
                            th:href="@{/people/next}" th:text="'>'"></a>
                         <a th:action="end" class="btn btn-secondary btn-sm" th:href="@{/people/ff}"
                            th:text="'>>'"></a>
                        </span></td>
            </tr>
            </tfoot>
        </table>
    </div>
</div>
</body>
</html>
