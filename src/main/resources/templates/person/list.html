<!--suppress HtmlUnknownTarget -->
<html lang="en" xmlns:th="http://www.thymeleaf.org">


<head>
    <meta charset="UTF-8"/>
    <title>People </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<div class="banner">
    <div class="container">
        <div class="row">
            <div class="col-sm-2">
                <h1>Grants</h1>
                <p></p>
            </div>
            <div class="col-sm-7">
                <div class="w-25 p-3">
                    <img class="img-fluid" src="Four.jpg"  alt="">
                </div>
            </div>
        </div>
    </div>
</div>


<div class="container text-center">
    <div class="container border border-info
                rounded-3 text-center p-4">
        <h3>Persons</h3>
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th></th>
            </tr>
            </thead>

            <tr th:each="person : ${people}">
                <!--/*@thymesVar id="person" type="scot.carricksoftware.grants.domains.people.Person"*/-->
                <td th:text="${person.id}">123</td>
                <td th:text="${person.firstName}"> First</td>
                <td th:text="${person.lastName}">Last</td>
                <td><span>
                    <a th:action="delete" class="btn btn-danger btn-sm" href="#" role="button"
                       th:text="${button.DELETE}"></a>
                <a th:action="edit" class="btn btn-warning btn-sm" href="#" role="button" th:text="${button.EDIT}"></a>
                </span></td>
            </tr>
            <tfoot>
            <tr>
                <td colspan="4"><span>
                    <a th:action="rewind" class="btn btn-secondary btn-sm" href="#" role="button"
                       th:text="${button.REWIND}"></a>
                     <a th:action="back" class="btn btn-secondary btn-sm" href="#" role="button"
                        th:text="${button.BACK}"></a>
                     <a th:action="new" class="btn btn-primary btn-sm" href="#" role="button"
                        th:text="${button.NEW} + 'Person'"></a>
                     <a th:action="home" class="btn btn-success btn-sm" href="./" role="button"
                        th:text="${button.HOME}"></a>
                     <a th:action="forward" class="btn btn-secondary btn-sm"
                        th:href="@{/people/next}" role="button"
                        th:text="${button.FORWARD}"></a>
                     <a th:action="end" class="btn btn-secondary btn-sm" href="#" role="button"
                        th:text="${button.END}"></a>
                    </span></td>
            </tr>
            </tfoot>
        </table>
    </div>
</div>
</body>
</html>
